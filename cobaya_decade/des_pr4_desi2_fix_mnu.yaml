theory:
  camb:
    path: /home/baijc/software/MGCobaya/MGCAMB
    extra_args:
      num_massive_neutrinos: 3
      nnu: 3.046
      theta_H0_range:
      - 20
      - 100
      MG_flag: 3   
      QSA_flag: 4
likelihood:
  bao.desi_dr2: null
  planck_2018_lowl.TT: null
  planck_2018_lowl.EE: null
  planck_NPIPE_highl_CamSpec.TTTEEE: null
  planckpr4lensing:
    package_install:
      github_repository: carronj/planck_PR4_lensing
      min_version: 1.0.2
  des.shear: 
    python_path: .
    speed: 0.3

params:
  omegam:
    latex: \Omega_\mathrm{m}
    prior:
      min: 0.1
      max: 0.5
    ref:
      dist: norm
      loc: 0.3
      scale: 0.01
    proposal: 0.005
  omegab:
    latex: \Omega_\mathrm{b}
    prior:
      min: 0.03
      max: 0.07
    ref:
      dist: norm
      loc: 0.048
      scale: 0.002
    proposal: 0.001
  H0:
    latex: H0
    prior:
      min: 50
      max: 90
    ref:
      dist: norm
      loc: 67
      scale: 1
    proposal: 1
  ns:
    prior:
      min: 0.8
      max: 1.2
    ref:
      dist: norm
      loc: 0.97
      scale: 0.005
    latex: n_\mathrm{s}
    proposal: 0.005
  logA:
    prior:
      min: 1.61
      max: 3.91
    ref:
      dist: norm
      loc: 3.05
      scale: 0.01
    proposal: 0.01
    latex: \log(10^{10} A_\mathrm{s})
    drop: true
  As:
    value: 'lambda logA: 1e-10*np.exp(logA)'
    latex: A_\mathrm{s}
  mnu: 0.06
  logfR0:
    prior:
      min: -7
      max: -3.5
    ref:
      dist: norm
      loc: -5
      scale: 0.5
    proposal: 0.5
    latex: \log_{10}{|f_{R0}|}
  F_R0:
    value: 'lambda logfR0: 10**logfR0'
  FRn: 1.0

  sigma8:
    latex: \sigma_8  
  S8:
    derived: 'lambda sigma8, omegam: sigma8*(omegam/0.3)**0.5'
    latex: S_8

  omeganu:
    value: 'lambda mnu, H0: mnu/93.14/(H0/100)**2'
  ombh2:
    value: 'lambda omegab, H0: omegab*(H0/100)**2'
    latex: \Omega_\mathrm{b} h^2
  omch2:
    value: 'lambda omegam, omegab, omeganu, H0: (omegam-omegab-omeganu)*(H0/100)**2'
    latex: \Omega_\mathrm{c} h^2
  tau:
    prior:
      min: 0.01
      max: 0.8
    ref:
      dist: norm
      loc: 0.055
      scale: 0.002
    proposal: 0.002
    latex: \tau_\mathrm{reio}


sampler:
  mcmc:
    drag: False
    oversample_power: 0.4
    proposal_scale: 2.4
    covmat: des_kids_pr4_desi2_fix_mnu_chains_cut/test.covmat
    Rminus1_stop: 0.05
    Rminus1_cl_stop: 0.2
    max_samples: .inf
    max_tries: 1000d
    learn_every: 2d
    learn_proposal_Rminus1_max_early: 1000.
    learn_proposal_Rminus1_max: 1000


output: des_pr4_desi2_fix_mnu_chains_cut/test
debug: False
