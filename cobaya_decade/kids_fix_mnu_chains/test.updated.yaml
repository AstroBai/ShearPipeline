      dist: norm
      loc: 0.3
      scale: 0.02
    proposal: 0.01
  omegab:
    latex: \Omega_\mathrm{b}
    prior:
      min: 0.03
      max: 0.07
    ref:
      dist: norm
      loc: 0.05
      scale: 0.002
    proposal: 0.002
  H0:
    latex: H0
    prior:
      min: 50
      max: 90
    ref:
      dist: norm
      loc: 67
      scale: 2
    proposal: 2
  ns:
    prior:
      min: 0.8
      max: 1.2
    ref:
      dist: norm
      loc: 1.0
      scale: 0.02
    latex: n_\mathrm{s}
    proposal: 0.02
  logA:
    prior:
      min: 1.61
      max: 3.91
    ref:
      dist: norm
      loc: 3.05
      scale: 0.01
    proposal: 0.01
    latex: \log(10^{10} A_\mathrm{s})
