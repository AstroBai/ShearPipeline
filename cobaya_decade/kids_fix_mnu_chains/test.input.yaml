likelihood:
  kids_legacy_no_cut.shear:
    python_path: .
    speed: 0.3
params:
  omegam:
    latex: \Omega_\mathrm{m}
    prior:
      min: 0.1
      max: 0.5
    ref:
      dist: norm
      loc: 0.3
      scale: 0.02
    proposal: 0.01
  omegab:
    latex: \Omega_\mathrm{b}
    prior:
      min: 0.03
      max: 0.07
    ref:
      dist: norm
      loc: 0.05
      scale: 0.002
    proposal: 0.002
  H0:
    latex: H0
    prior:
      min: 50
      max: 90
    ref:
      dist: norm
      loc: 67
      scale: 2
    proposal: 2
  ns:
    prior:
      min: 0.8
      max: 1.2
    ref:
      dist: norm
      loc: 1.0
      scale: 0.02
    latex: n_\mathrm{s}
    proposal: 0.02
  logA:
    prior:
      min: 1.61
      max: 3.91
    ref:
      dist: norm
      loc: 3.05
      scale: 0.01
    proposal: 0.01
    latex: \log(10^{10} A_\mathrm{s})
    drop: true
  As:
    value: 'lambda logA: 1e-10*np.exp(logA)'
    latex: A_\mathrm{s}
  mnu: 0.06
  logfR0:
    prior:
      min: -7
      max: -3.5
    ref:
      dist: norm
      loc: -6
      scale: 0.5
    proposal: 0.5
sampler:
  mcmc:
    drag: false
    oversample_power: 0.4
    proposal_scale: 2.4
    covmat: auto
    Rminus1_stop: 0.05
    Rminus1_cl_stop: 0.2
    max_samples: .inf
    learn_every: 10d
    learn_proposal_Rminus1_max_early: 100
    learn_proposal_Rminus1_max: 100
output: test
