likelihood:
  des_no_cut.shear: 
    python_path: .
    speed: 0.3
  decade_ngc.shear: 
    python_path: .
    speed: 0.3
  decade_sgc.shear: 
    python_path: .
    speed: 0.3  
theory:
  camb:
    path: /home/baijc/software/MGCobaya/MGCAMB
    extra_args:
      num_massive_neutrinos: 3
      nnu: 3.046
      theta_H0_range:
      - 20
      - 100
      MG_flag: 3   
      QSA_flag: 4

params:
  #------------------------------------------------
  # here are fremu parameters
  omegam:
    latex: \Omega_\mathrm{m}
    prior:
      min: 0.1
      max: 0.5
    ref: 
      dist: norm
      loc: 0.3
      scale: 0.02
    proposal: 0.01  

  omegab:
    latex: \Omega_\mathrm{b}
    prior:
      min: 0.03
      max: 0.07
    ref: 
      dist: norm
      loc: 0.05
      scale: 0.002
    proposal: 0.002  

  H0: 
    latex: H0
    prior:
      min: 50
      max: 90  
    ref: 
      dist: norm
      loc: 67
      scale: 2
    proposal: 2 

  ns: 
    prior:
      min: 0.8
      max: 1.2
    ref: 
      dist: norm
      loc: 1.0
      scale: 0.02
    latex: n_\mathrm{s}
    proposal: 0.02  

  logA:
    prior:
      min: 1.61
      max: 3.91
    ref:
      dist: norm
      loc: 3.05
      scale: 0.01
    proposal: 0.01
    latex: \log(10^{10} A_\mathrm{s})
    drop: true
  As:
    value: 'lambda logA: 1e-10*np.exp(logA)'
    latex: A_\mathrm{s}

  mnu: 0.06

  logfR0:
    prior:
      min: -7
      max: -3.5
    ref: 
      dist: norm
      loc: -6
      scale: 0.5
    proposal: 0.5

  logMc:
    prior:
      min: 12
      max: 16
    ref: 
      dist: norm
      loc: 14
      scale: 0.5  
    proposal: 0.5  
    latex: \log m^{\mathrm{c}}
  eta_b:
    prior:
      min: 0.1
      max: 1.0
    ref:
      dist: norm
      loc: 0.5
      scale: 0.1  
    proposal: 0.1   
    latex: \eta_{\mathrm{b}}  

  sigma8:
    latex: \sigma_8

  F_R0:
    value: 'lambda logfR0: 10**logfR0'
  FRn: 1.0

  S8:
    derived: 'lambda sigma8, omegam: sigma8*(omegam/0.3)**0.5'
    latex: S_8
  ombh2:
    derived: 'lambda omegab, H0: omegab*(H0/100)**2'
    latex: \Omega_\mathrm{b} h^2
  omch2:
    derived: 'lambda omegam, omegab, H0: (omegam-omegab)*(H0/100)**2'
    latex: \Omega_\mathrm{c} h^2
  omegamh2:
    derived: 'lambda omegam, H0: omegam*(H0/100)**2'
    latex: \Omega_\mathrm{m} h^2  


sampler:
  mcmc:
    drag: false
    oversample_power: 0.4
    proposal_scale: 2.4
    covmat: /home/baijc/ShearPipeline/cobaya_decade/decade.covmat
    Rminus1_stop: 0.05
    Rminus1_cl_stop: 0.2
    max_samples: .inf
    learn_every: 2d
    learn_proposal_Rminus1_max_early: 1000
    learn_proposal_Rminus1_max: 1000

output: decade13_fix_mnu_chains_cut/test